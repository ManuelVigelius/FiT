diffusion:
  pretrained_first_stage_model_path: stabilityai/sd-vae-ft-ema
  transport:
    path_type: Linear
    prediction: velocity
    loss_weight: null
    sample_eps: null
    train_eps: null
    snr_type: lognorm
    multires_loss: 'C'   # FiT at low-res → ResNet upsample → full-res velocity loss
  sampler:
    mode: ODE
    sde:
      sampling_method: Euler
      diffusion_form: sigma
      diffusion_norm: 1.0
      last_step: Mean
      last_step_size: 0.04
    ode:
      sampling_method: dopri5
      atol: 1.0e-06
      rtol: 0.001
      reverse: false
      likelihood: false
  network_config:
    target: fit.model.fit_model.FiT
    params:
      context_size: 256
      patch_size: 2
      in_channels: 4
      hidden_size: 1152
      depth: 36
      num_heads: 16
      mlp_ratio: 4.0
      class_dropout_prob: 0.1
      num_classes: 1000
      learn_sigma: false
      use_swiglu: true
      use_swiglu_large: false
      q_norm: layernorm
      k_norm: layernorm
      qk_norm_weight: false
      rel_pos_embed: rope
      online_rope: true
      abs_pos_embed: null
      adaln_type: lora
      adaln_lora_dim: 288
      use_size_cond: true
      use_upsampler: true      # ResNetUpsampler for Loss C
      pretrain_ckpt: checkpoints/fitv2_xl.safetensors

data:
  target: fit.data.in1k_latent_dataset.INLatentLoader
  params:
    train:
      data_path: datasets/imagenet1k_latents_256_sd_vae_ft_ema
      target_len: 256
      random: 'crop'
      resize_range: [1, 16]
      return_fullres: true     # required for Loss C
      packed:
        enabled: true
        max_tokens: 8192
        pad_to_multiple: 128
      loader:
        batch_size: 4
        num_workers: 4
        shuffle: True


accelerate:
  gradient_accumulation_steps: 1
  mixed_precision: 'bf16'
  num_train_epochs:
  max_train_steps: 2000        # short warmup — tune as needed before switching to Loss C full training
  learning_rate: 1.0e-4
  learning_rate_base_batch_size: 256
  max_grad_norm: 1.0
  optimizer:
    target: torch.optim.AdamW
    params:
      betas: ${tuple:0.9, 0.999}
      weight_decay: 0
      eps: 1.0e-8
  lr_scheduler: constant_with_warmup
  lr_warmup_steps: 100
  logger: wandb
  checkpointing_epochs: False
  checkpointing_steps: 1000
  checkpointing_steps_list: [2000]
  checkpoints_total_limit: 2
  logging_steps: 100
